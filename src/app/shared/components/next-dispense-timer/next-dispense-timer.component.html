@if (status()) {
  <div class="timer-wrapper">

    <div class="timer-icon" aria-hidden="true"></div>

    <p class="timer-label">{{ 'next-dispense.label' | translate }}</p>

    <div class="timer-countdown">{{ countdown() }}</div>

    @if (status()!.nextDispenseAt) {
      <p class="timer-next-info">
        {{ status()!.dailyTotal }}g
      </p>
    }

    <div class="timer-bg-circle" aria-hidden="true"></div>

  </div>
} @else {
  <p class="timer-loading">{{ 'common.loading' | translate }}</p>
}
